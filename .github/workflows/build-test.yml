name: Build & Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'App/**'
      - '.github/workflows/build-test.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'App/**'

env:
  REGISTRY: docker.io
  IMAGE_NAME: showdeal

jobs:
  # ============================================
  # 1. LINT & CODE QUALITY
  # ============================================
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./App
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'App/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint (si está configurado)
        run: npm run lint 2>/dev/null || echo "⚠️ ESLint no configurado"
      
      - name: Check for security vulnerabilities
        run: npm audit --audit-level=high || true

  # ============================================
  # 2. BUILD DOCKER IMAGE
  # ============================================
  build-image:
    needs: lint
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build Docker image (sin push)
        uses: docker/build-push-action@v5
        with:
          context: ./App
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ============================================
  # 3. UNIT TESTS & DATABASE TESTS
  # ============================================
  test:
    needs: lint
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    defaults:
      run:
        working-directory: ./App
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'App/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Setup test database
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db?schema=public
        run: |
          npm run prisma:generate
          npx prisma db push --skip-generate 2>/dev/null || echo "DB setup done"
      
      - name: Run tests (si están configurados)
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db?schema=public
        run: npm test 2>/dev/null || echo "⚠️ Tests no configurados"
      
      - name: Run module database tests
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db?schema=public
        run: npm run test:modules 2>/dev/null || echo "⚠️ Module tests no configurados"

  # ============================================
  # 4. SECURITY SCANNING
  # ============================================
  security:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './App'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================
  # 5. NOTIFY SUCCESS
  # ============================================
  notify-success:
    needs: [lint, build-image, test, security]
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Send Slack notification (success)
        if: secrets.SLACK_WEBHOOK_URL
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "✅ Build & Test Passed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ ShowDeal Build & Test Passed*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow>"
                  }
                }
              ]
            }

  # ============================================
  # 6. NOTIFY FAILURE
  # ============================================
  notify-failure:
    needs: [lint, build-image, test]
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
      - name: Send Slack notification (failure)
        if: secrets.SLACK_WEBHOOK_URL
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "❌ Build & Test Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ ShowDeal Build & Test Failed*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow>"
                  }
                }
              ]
            }
