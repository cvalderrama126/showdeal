name: Deploy to Production

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:  # Permite deployment manual

env:
  REGISTRY: docker.io
  IMAGE_NAME: showdeal

jobs:
  # ============================================
  # 1. APPROVAL GATE
  # ============================================
  approval:
    runs-on: ubuntu-latest
    
    steps:
      - name: Notify pending approval
        uses: slackapi/slack-github-action@v1
        if: secrets.SLACK_WEBHOOK_URL
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "⏳ Production Deployment Awaiting Approval",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*⏳ ShowDeal Production Deployment Pending*\nBuild: #${{ github.run_number }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }

  # ============================================
  # 2. BUILD PRODUCTION IMAGE
  # ============================================
  build:
    needs: approval
    runs-on: ubuntu-latest
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.version.outputs.version }}
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract version
        id: version
        run: |
          if [[ ${{ github.ref }} == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.run_number }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=raw,value=prod-${{ steps.version.outputs.version }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./App
          push: true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

  # ============================================
  # 3. DEPLOY TO PRODUCTION
  # ============================================
  deploy-heroku:
    needs: build
    runs-on: ubuntu-latest
    
    # Solo si tenemos Heroku configured
    if: secrets.HEROKU_API_KEY != ''
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Heroku
        uses: AkhileshNS/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          usedocker: true
          docker_image_name: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
      
      - name: Run database migrations
        run: |
          heroku run "npx prisma migrate deploy" \
            --app ${{ secrets.HEROKU_APP_NAME }} \
            --exit-code
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}

  # ============================================
  # 4. DEPLOY TO RAILWAY PRODUCTION
  # ============================================
  deploy-railway:
    needs: build
    runs-on: ubuntu-latest
    
    if: secrets.RAILWAY_PROD_API_TOKEN != ''
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Railway (Production)
        uses: HaykelHaouchen/railway-action@main
        with:
          railway_token: ${{ secrets.RAILWAY_PROD_API_TOKEN }}
          environment: production
          service_name: showdeal-api
        env:
          NODE_ENV: production
          LOG_LEVEL: warn
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          JWT_CHALLENGE_SECRET: ${{ secrets.PROD_JWT_CHALLENGE_SECRET }}
          REDIS_URL: ${{ secrets.PROD_REDIS_URL }}

  # ============================================
  # 5. HEALTH CHECKS & SMOKE TESTS
  # ============================================
  health-check:
    needs: [deploy-heroku, deploy-railway]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Health check
        run: |
          for i in {1..20}; do
            response=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "User-Agent: GitHub-Actions" \
              ${{ secrets.PROD_API_URL }}/health)
            
            if [ "$response" = "200" ]; then
              echo "✅ Production API is healthy"
              exit 0
            fi
            
            echo "⏳ Attempt $i/20 - Status: $response"
            sleep 10
          done
          
          echo "❌ Production API not responding after 200 seconds"
          exit 1

  # ============================================
  # 6. ROLLBACK IF NEEDED
  # ============================================
  rollback:
    needs: health-check
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
      - name: Rollback Heroku
        if: secrets.HEROKU_API_KEY != ''
        run: |
          heroku releases:rollback \
            --app ${{ secrets.HEROKU_APP_NAME }}
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      
      - name: Notify rollback
        if: secrets.SLACK_WEBHOOK_URL
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "🚨 Production Rollback Executed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🚨 ShowDeal Production Rolled Back*\nBuild #${{ github.run_number }} failed health check\nRolled back to previous version"
                  }
                }
              ]
            }

  # ============================================
  # 7. NOTIFICATIONS
  # ============================================
  notify:
    needs: [build, health-check]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Extract version
        id: version
        run: |
          if [[ ${{ github.ref }} == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Notify success
        if: success() && secrets.SLACK_WEBHOOK_URL
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "✅ Production Deployment Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ ShowDeal v${{ steps.version.outputs.version }} Deployed to Production*\nURL: ${{ secrets.PROD_API_URL }}\nAll systems operational ✓"
                  }
                }
              ]
            }
      
      - name: Notify failure
        if: failure() && secrets.SLACK_WEBHOOK_URL
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "❌ Production Deployment Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ ShowDeal v${{ steps.version.outputs.version }} Deployment Failed*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                  }
                }
              ]
            }

  # ============================================
  # 8. CREATE RELEASE NOTES
  # ============================================
  release-notes:
    needs: notify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          makeLatest: true
          prerelease: false
          body: |
            ## ShowDeal v${{ github.ref_name }}
            
            **Deployed to Production**
            
            - Docker Image: `${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Status: ✅ Active
            
            ### Changes
            
            See commits for detailed changes.
