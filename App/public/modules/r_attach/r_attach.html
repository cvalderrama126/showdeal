<div class="sd-card p-4">
  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
    <div>
      <h4 class="mb-1">Adjuntos</h4>
      <div class="sd-muted">Archivos vinculados a los activos con subida binaria y descarga segura.</div>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-sd-outline" id="btnRefreshAttach">Refrescar</button>
      <button class="btn btn-sd" id="btnNewAttach">+ Nuevo</button>
    </div>
  </div>

  <div class="row g-3 mt-1">
    <div class="col-12 col-lg-5">
      <label class="form-label">Buscar</label>
      <input class="form-control" id="attachFilterSearch" placeholder="Archivo, hash, tipo o UIN del activo">
    </div>
    <div class="col-12 col-md-6 col-lg-3">
      <label class="form-label">Activo</label>
      <select class="form-select" id="attachFilterAsset">
        <option value="">Todos</option>
      </select>
    </div>
    <div class="col-12 col-md-6 col-lg-2">
      <label class="form-label">Tipo</label>
      <input class="form-control" id="attachFilterType" list="attachTypeSuggestions" placeholder="Ej. TITLE">
      <datalist id="attachTypeSuggestions"></datalist>
    </div>
    <div class="col-12 col-lg-2">
      <label class="form-label d-block">Estado</label>
      <div class="form-check mt-2">
        <input class="form-check-input" type="checkbox" id="attachFilterInactive">
        <label class="form-check-label" for="attachFilterInactive">Incluir inactivos</label>
      </div>
    </div>
  </div>

  <div class="mt-3" id="attachAlert"></div>

  <div class="table-responsive">
    <table class="table table-sm align-middle sd-table">
      <thead>
        <tr id="tblAttachHead"></tr>
      </thead>
      <tbody id="tblAttachBody"></tbody>
    </table>
  </div>

  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mt-3">
    <div class="sd-muted small" id="attachPaginationInfo">Sin resultados</div>
    <div class="d-flex gap-2">
      <button class="btn btn-sd-outline btn-sm" id="btnAttachPrev">Anterior</button>
      <button class="btn btn-sd-outline btn-sm" id="btnAttachNext">Siguiente</button>
    </div>
  </div>
</div>

<div class="modal fade" id="attachModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content sd-card">
      <div class="modal-header">
        <h5 class="modal-title" id="attachModalTitle">Nuevo adjunto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        <div id="attachModalAlert"></div>
        <form id="attachForm" class="row g-3">
          <div class="col-12 col-md-6">
            <label class="form-label">Activo</label>
            <select class="form-select" name="id_asset" required>
              <option value="">Selecciona...</option>
            </select>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">Tipo de adjunto</label>
            <select class="form-select" name="tp_attach" required>
              <option value="">-- Seleccionar --</option>
              <option value="PHOTO">Foto</option>
              <option value="APPRAISAL">Avalúo</option>
              <option value="LEGAL_DOCUMENT">Documento legal</option>
              <option value="TITLE_DEED">Escritura</option>
              <option value="INVOICE">Factura</option>
              <option value="TECHNICAL_REPORT">Informe técnico</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">Archivo</label>
            <input class="form-control" type="file" name="file" required>
            <div class="sd-muted small mt-2" id="attachCurrentFileInfo"></div>
          </div>
          <div class="col-12">
            <div class="form-check mt-2">
              <input class="form-check-input" type="checkbox" id="attachIsActive" name="is_active" checked>
              <label class="form-check-label" for="attachIsActive">Activo</label>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sd-outline" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-sd" id="btnSaveAttach">Guardar</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="attachDeleteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content sd-card">
      <div class="modal-header">
        <h5 class="modal-title">Confirmar</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        ¿Seguro que quieres desactivar este adjunto?
        <div id="attachDeleteInfo" class="mt-2"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sd-outline" data-bs-dismiss="modal">No</button>
        <button type="button" class="btn btn-sd" id="btnConfirmAttachDelete">Si, continuar</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="attachPreviewModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content sd-card">
      <div class="modal-header">
        <h5 class="modal-title" id="attachPreviewTitle">Previsualizacion</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        <div id="attachPreviewBody"></div>
      </div>
    </div>
  </div>
</div>
